name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs
        
      - name: Check API Configuration
        run: |
          if [ -z "${{ secrets.API_KEY }}" ] && [ -z "${{ vars.API_KEY }}" ]; then
            echo "::error::API_KEY is missing from both Secrets and Variables! AI features will fail."
            exit 1
          else
            echo "API_KEY configuration found."
          fi

      - name: Build Web
        run: flutter build web --release --base-href / --dart-define=API_KEY=${{ secrets.API_KEY || vars.API_KEY }}
        
      # - name: Setup Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'

      # - name: Install Functions Dependencies
      #   run: npm ci --prefix functions

      - name: Deploy to Firebase
        run: |
          npm install -g firebase-tools
          export GOOGLE_APPLICATION_CREDENTIALS_JSON='${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUMQUIZ_3D54E }}'
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > gcp-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/gcp-key.json
          firebase deploy --only hosting,firestore --project sumquiz-3d54e --non-interactive
